<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score</title>
    <link rel="stylesheet" href="../styles/score.css">
</head>
<body>
    <div class="score-board">
        <p>Your Score</p>
        <p id="score">0</p>
        <p id="high-score">0</p>
        <div id="score-message">
            <p>Accuracy: 95% </p>
            <p>Reaction Time: 200ms</p>
            <p>Learning Progress: 80%</p>
            <p>Score Progression: +10 points</p>
            <ul>Category Mastery: 75%
                <li>Plastic: 80%</li>
                <li>Paper: 70%</li>
                <li>Glass: 60%</li>
            </ul>
        </div>
        <div id="buttons">
            <button id="restart">Restart</button>
            <button id="home">Home</button>
        </div>
    </div>
    
</body>
</html>
